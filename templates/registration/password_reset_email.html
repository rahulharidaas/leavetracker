
<!DOCTYPE html>
<html>
<body>
    <div style="font-family:Arial; max-width:480px; margin:auto; padding:32px; text-align:center">
        <h2>Reset Your Password</h2>
        <p>We received a request to reset your password for your Leave Tracker account.</p>
        <p>Click the button below to set a new password:</p>
        <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
           style="display:inline-block; padding:14px 28px; background:#1a1a1a;
                  color:white; text-decoration:none; border-radius:50px;
                  font-weight:600; margin-top:16px;">
            Reset Password
        </a>
        <p style="margin-top:24px; color:#9e9e9e; font-size:13px;">
            If you did not request this, ignore this email.
        </p>
        <p style="color:#9e9e9e; font-size:13px;">
            This link expires in 24 hours.
        </p>
    </div>
</body>
</html>
