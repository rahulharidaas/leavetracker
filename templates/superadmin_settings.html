

{% extends 'base.html' %}

{% block title %}Settings{% endblock %}

{% block sidebar %}
    <div class="section-label">Main Menu</div>
    <a href="{% url 'superadmin_dashboard' %}">📊 Dashboard</a>
    <a href="{% url 'superadmin_companies' %}">🏢 Companies</a>
    <a href="#">👤 Users</a>
    <a href="{% url 'superadmin_settings' %}" >⚙️ Settings</a>
{% endblock %}

{% block content %}
    <h1>Settings</h1>

    <!-- Profile Section -->
    <div style="background:white; padding:24px; border-radius:10px; margin-top:24px; box-shadow:0 1px 4px rgba(0,0,0,0.08); max-width:500px;">
        <h2 style="font-size:15px; font-weight:700; margin-bottom:20px;">Profile</h2>

        <div style="margin-bottom:16px;">
            <label style="font-size:12px; color:#9e9e9e; display:block; margin-bottom:4px;">Username</label>
            <p style="font-size:15px; font-weight:600;">{{ request.user.username }}</p>
        </div>

        <div style="margin-bottom:16px;">
            <label style="font-size:12px; color:#9e9e9e; display:block; margin-bottom:4px;">Email</label>
            <p style="font-size:15px; font-weight:600;">{{ request.user.email }}</p>
        </div>

        <div style="border-top:1px solid #e0e0e0; padding-top:16px; margin-top:8px;">
            <a href="{% url 'password_reset' %}" 
                style="font-size:13px; color:#8B6914; text-decoration:underline; cursor:pointer;">
                Forgot Password?
            </a>
        </div>
    </div>

{% endblock %}
