

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Leave Tracker{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Jost', Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: #1a1a1a;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .navbar .logo {
            color: white;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.15em;
        }

        .navbar .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .navbar .username {
            color: #ccc;
            font-size: 14px;
        }

        .navbar .logout-btn {
            color: white;
            text-decoration: none;
            font-size: 13px;
            background: #333;
            padding: 6px 14px;
            border-radius: 6px;
        }

        .navbar .logout-btn:hover { background: #444; }

        /* Layout */
        .layout {
            display: flex;
            margin-top: 56px;
            flex: 1;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: white;
            min-height: calc(100vh - 56px);
            border-right: 1px solid #e0e0e0;
            padding: 24px 0;
            position: fixed;
            top: 56px;
        }

        .sidebar a {
            display: block;
            padding: 12px 24px;
            color: #444;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .sidebar a:hover {
            background: #f0f2f5;
            color: #1a1a1a;
        }

        .sidebar a.active {
            background: #f0f2f5;
            color: #1a1a1a;
            border-left: 3px solid #1a1a1a;
        }

        .sidebar .section-label {
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #9e9e9e;
            padding: 16px 24px 8px;
        }

        /* Main content */
        .main-content {
            margin-left: 220px;
            padding: 32px;
            flex: 1;
        }

        /* Footer */
        .footer {
            margin-left: 220px;
            padding: 16px 32px;
            font-size: 12px;
            color: #9e9e9e;
            border-top: 1px solid #e0e0e0;
            background: white;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">HR TOOL</div>
        <div class="nav-right">
            <span class="username">👤 {{ request.user.username }}</span>
            <a href="{% url 'logout' %}" class="logout-btn">Logout</a>
        </div>
    </div>

    <!-- Layout -->
    <div class="layout">

        <!-- Sidebar -->
        <div class="sidebar">
            {% block sidebar %}{% endblock %}
        </div>

        <!-- Main Content -->
        <div class="main-content">
            {% block content %}{% endblock %}
        </div>

    </div>

    <!-- Footer -->
    <div class="footer">
        Copyright &copy; 2026 Leave Tracker
    </div>

</body>
</html>
